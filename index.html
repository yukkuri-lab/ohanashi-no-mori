<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>おはなしのもり</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #fff9e6 0%, #e8f5e9 50%, #e3f2fd 100%);
      font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic Pro', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* 背景の星 */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .star {
      position: absolute;
      font-size: 1.4rem;
      animation: twinkle var(--dur, 4s) ease-in-out infinite;
      opacity: 0;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0;   transform: scale(0.8) rotate(0deg); }
      50%       { opacity: 0.7; transform: scale(1.2) rotate(20deg); }
    }

    /* タイトルカード */
    .card {
      position: relative;
      z-index: 10;
      text-align: center;
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(8px);
      border-radius: 36px;
      padding: 56px 72px 52px;
      box-shadow: 0 8px 48px rgba(100, 180, 100, 0.2), 0 2px 8px rgba(0,0,0,0.06);
      border: 2.5px solid rgba(255,255,255,0.9);
    }

    .icon {
      font-size: 80px;
      line-height: 1;
      margin-bottom: 16px;
      display: block;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-12px); }
    }

    h1 {
      font-size: clamp(2.4rem, 8vw, 3.8rem);
      font-weight: 700;
      color: #2e7d32;
      letter-spacing: 0.12em;
      text-shadow: 0 2px 0 rgba(255,255,255,0.9);
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: clamp(0.95rem, 2.5vw, 1.15rem);
      color: #6a8f4c;
      letter-spacing: 0.06em;
      margin-bottom: 44px;
    }

    .btn {
      display: inline-block;
      padding: 20px 72px;
      font-family: inherit;
      font-size: clamp(1.2rem, 4vw, 1.6rem);
      font-weight: 700;
      letter-spacing: 0.2em;
      color: #fff;
      background: linear-gradient(135deg, #66bb6a, #43a047);
      border: none;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 6px 0 #2e7d32, 0 10px 24px rgba(67,160,71,0.35);
      transition: transform 0.12s, box-shadow 0.12s;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 9px 0 #2e7d32, 0 14px 32px rgba(67,160,71,0.4);
    }

    .btn:active {
      transform: translateY(3px);
      box-shadow: 0 3px 0 #2e7d32, 0 4px 12px rgba(67,160,71,0.25);
    }

    /* 背景の木 */
    .trees {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      pointer-events: none;
      display: flex;
      justify-content: space-around;
      align-items: flex-end;
      padding: 0 16px;
      z-index: 2;
    }

    .tree {
      display: flex;
      flex-direction: column;
      align-items: center;
      opacity: 0.55;
    }

    .tree-top {
      width: 0;
      height: 0;
      border-left: solid transparent;
      border-right: solid transparent;
    }

    .tree.big .tree-top.t1  { border-left-width: 34px; border-right-width: 34px; border-bottom: 60px solid #81c784; }
    .tree.big .tree-top.t2  { border-left-width: 24px; border-right-width: 24px; border-bottom: 44px solid #a5d6a7; margin-bottom: -14px; }
    .tree.big .tree-top.t3  { border-left-width: 16px; border-right-width: 16px; border-bottom: 30px solid #c8e6c9; margin-bottom: -10px; }
    .tree.big .tree-trunk   { width: 14px; height: 44px; background: #a1887f; border-radius: 4px; }

    .tree.small .tree-top.t1 { border-left-width: 22px; border-right-width: 22px; border-bottom: 38px solid #81c784; }
    .tree.small .tree-top.t2 { border-left-width: 16px; border-right-width: 16px; border-bottom: 28px solid #a5d6a7; margin-bottom: -9px; }
    .tree.small .tree-top.t3 { border-left-width: 10px; border-right-width: 10px; border-bottom: 18px solid #c8e6c9; margin-bottom: -6px; }
    .tree.small .tree-trunk  { width: 10px; height: 30px; background: #a1887f; border-radius: 4px; }
  </style>
</head>
<body>

  <div class="stars" id="stars"></div>

  <div class="card">
    <span class="icon">🌳</span>
    <h1>おはなしのもり</h1>
    <p class="subtitle">ふしぎなおはなしがまっているよ</p>
    <button class="btn" onclick="start()">はじめる</button>
  </div>

  <div class="trees">
    <div class="tree small">
      <div class="tree-top t3"></div>
      <div class="tree-top t2"></div>
      <div class="tree-top t1"></div>
      <div class="tree-trunk"></div>
    </div>
    <div class="tree big">
      <div class="tree-top t3"></div>
      <div class="tree-top t2"></div>
      <div class="tree-top t1"></div>
      <div class="tree-trunk"></div>
    </div>
    <div class="tree small">
      <div class="tree-top t3"></div>
      <div class="tree-top t2"></div>
      <div class="tree-top t1"></div>
      <div class="tree-trunk"></div>
    </div>
    <div class="tree big">
      <div class="tree-top t3"></div>
      <div class="tree-top t2"></div>
      <div class="tree-top t1"></div>
      <div class="tree-trunk"></div>
    </div>
    <div class="tree small">
      <div class="tree-top t3"></div>
      <div class="tree-top t2"></div>
      <div class="tree-top t1"></div>
      <div class="tree-trunk"></div>
    </div>
  </div>

  <script>
    const emojis = ['⭐', '✨', '🌟', '💫'];
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 18; i++) {
      const s = document.createElement('span');
      s.className = 'star';
      s.textContent = emojis[i % emojis.length];
      s.style.left = Math.random() * 95 + '%';
      s.style.top  = Math.random() * 80 + '%';
      s.style.setProperty('--dur', (3 + Math.random() * 4).toFixed(1) + 's');
      s.style.animationDelay = (Math.random() * 4).toFixed(1) + 's';
      starsEl.appendChild(s);
    }

    function start() {
      alert('おはなしのもりへ ようこそ！');
    }
  </script>
</body>
</html>
